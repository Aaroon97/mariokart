<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Mario Kart Championship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* ══════════════════════════════════════════
   MARIO KART CHAMPIONSHIP — DESIGN SYSTEM
   ══════════════════════════════════════════ */

/* ── VARIABLES ── */
:root{
  --red:#E52521;      --red-dark:#A81C19;
  --yellow:#FBD000;   --yellow-dark:#C9A600;
  --blue:#1A6FB5;     --blue-dark:#145A93;
  --green:#43B047;    --green-dark:#317A34;
  --purple:#9F2BC0;   --orange:#E87722;

  --bg:#0D0D0D;  --bg2:#151515;  --bg3:#1E1E1E;  --bg4:#272727;

  --card:rgba(255,255,255,.055);  --card-h:rgba(255,255,255,.09);
  --border:rgba(255,255,255,.09); --border-h:rgba(255,255,255,.18);

  --text:#F0F0F0;  --text2:#ABABAB;  --text3:#666;

  --gold:#FFD700;  --silver:#C0C0C0;  --bronze:#CD7F32;

  --r-sm:8px;  --r-md:12px;  --r-lg:16px;  --r-xl:20px;  --r-full:9999px;

  --t:0.3s ease;  --t-spring:0.3s cubic-bezier(.34,1.56,.64,1);

  --sh-sm:0 2px 14px rgba(0,0,0,.55);
  --sh-md:0 8px 36px rgba(0,0,0,.65);
  --sh-lg:0 20px 64px rgba(0,0,0,.75);
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;line-height:1.5;
}

/* ── BACKGROUND: dot grid + corner glows ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.022) 1px,transparent 1px);
  background-size:28px 28px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 0% 0%,  rgba(229,37,33,.16) 0%,transparent 65%),
    radial-gradient(ellipse 50% 50% at 100% 100%,rgba(26,111,181,.13) 0%,transparent 65%),
    radial-gradient(ellipse 55% 55% at 50% 50%, rgba(251,208,0,.04) 0%,transparent 70%);
}
#app-root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* ── ANIMATIONS ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}}
@keyframes popIn   {from{opacity:0;transform:scale(.91)}      to{opacity:1;transform:scale(1)}}
@keyframes float   {0%,100%{transform:translateY(0)}          50%{transform:translateY(-7px)}}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-5px) rotate(5deg)}}
@keyframes podiumRise{from{opacity:0;transform:scaleY(0);transform-origin:bottom}to{opacity:1;transform:scaleY(1);transform-origin:bottom}}
@keyframes rowIn   {from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin    {to{transform:rotate(360deg)}}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#8B0000 0%,var(--red) 40%,#CC1F1B 70%,#8B0000 100%);
  padding:.8rem 1rem;text-align:center;
  border-bottom:3px solid var(--yellow);
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 36px rgba(229,37,33,.55),0 1px 0 rgba(255,255,255,.1) inset;
  overflow:hidden;
}
/* racing stripe at bottom of header */
.header::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
  background-image:repeating-linear-gradient(90deg,#000 0px,#000 8px,var(--yellow) 8px,var(--yellow) 16px);
  opacity:.55;
}
.header::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(255,255,255,.07) 0%,transparent 65%);
}
.header-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(.55rem,2.4vw,1rem);
  color:var(--yellow);
  text-shadow:3px 3px 0 rgba(0,0,0,.75),-1px -1px 0 rgba(0,0,0,.35),0 0 22px rgba(251,208,0,.3);
  letter-spacing:1px;line-height:1.6;position:relative;z-index:1;
}
.header-sub{font-size:.68rem;color:rgba(255,255,255,.62);margin-top:.15rem;font-weight:800;letter-spacing:.5px;position:relative;z-index:1}

/* ── TOP NAV ── */
.top-nav{
  display:flex;gap:.4rem;padding:.55rem 1rem;
  background:var(--bg2);border-bottom:1px solid var(--border);
  align-items:center;flex-wrap:wrap;
}
.nav-pill{
  display:inline-flex;align-items:center;gap:.3rem;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text2);padding:.42rem .9rem;border-radius:var(--r-full);
  cursor:pointer;font-size:.8rem;font-weight:800;
  transition:all var(--t);white-space:nowrap;font-family:'Nunito',sans-serif;
}
.nav-pill:hover{background:rgba(255,255,255,.11);color:var(--text);border-color:var(--border-h);transform:translateY(-1px)}
.nav-pill.active{background:var(--yellow);color:#000;border-color:var(--yellow);box-shadow:0 2px 18px rgba(251,208,0,.42)}
.nav-pill.adm{background:rgba(229,37,33,.13);border-color:rgba(229,37,33,.28);color:#ff9090}
.nav-pill.adm:hover{background:rgba(229,37,33,.22);color:#ffbbbb}
.nav-pill.adm.active,.nav-pill.adm.logged{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 18px rgba(229,37,33,.48)}
.nav-spacer{flex:1}
.admin-tag{display:inline-block;background:var(--yellow);color:#000;font-size:.52rem;padding:1px 5px;border-radius:3px;font-weight:900;margin-left:4px}

/* ── BOTTOM NAV (mobile) ── */
.btm-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(12,12,12,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.08);z-index:200;
  padding:.3rem 0 max(.3rem,env(safe-area-inset-bottom));
  box-shadow:0 -4px 32px rgba(0,0,0,.65);
}
.btm-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:.1rem;
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:.38rem .3rem;transition:color var(--t);font-family:'Nunito',sans-serif;
}
.btm-btn.active{color:var(--yellow)}
.btm-icon-wrap{
  width:40px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);border:1px solid transparent;font-size:1.2rem;
  transition:all var(--t);
}
.btm-btn.active .btm-icon-wrap{background:rgba(251,208,0,.14);border-color:rgba(251,208,0,.32);box-shadow:0 2px 14px rgba(251,208,0,.2)}
.btm-label{font-size:.6rem;font-weight:800;letter-spacing:.2px}

@media(max-width:640px){
  .btm-nav{display:flex}
  .top-nav{display:none}
  .content{padding-bottom:calc(72px + .6rem) !important}
  .toast{bottom:calc(76px + .8rem)}
}

/* ── CONTENT ── */
.content{
  padding:1.2rem;max-width:1200px;margin:0 auto;
  width:100%;flex:1;animation:fadeInUp .32s ease both;
}

/* ── CARDS ── */
.card{
  background:linear-gradient(135deg,rgba(255,255,255,.065) 0%,rgba(255,255,255,.028) 100%);
  border:1px solid var(--border);border-radius:var(--r-lg);
  padding:1.2rem;margin-bottom:1rem;box-shadow:var(--sh-sm);
  transition:box-shadow var(--t),border-color var(--t),transform var(--t);
  animation:fadeInUp .3s ease both;
}
.card:hover{box-shadow:var(--sh-md);border-color:var(--border-h);transform:translateY(-2px)}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
.card-title{font-size:.95rem;font-weight:900;color:var(--yellow);letter-spacing:.3px}
.section-title{
  font-size:.88rem;font-weight:900;color:var(--yellow);
  margin-bottom:.7rem;padding-bottom:.45rem;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}

/* ── VIEW HEADER ── */
.view-hdr{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap}
.view-title{font-size:1.1rem;font-weight:900;color:var(--yellow);flex:1;min-width:0}
.back-btn{
  display:inline-flex;align-items:center;gap:.28rem;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--text);padding:.44rem .82rem;border-radius:var(--r-full);
  cursor:pointer;font-size:.8rem;font-weight:800;
  transition:all var(--t);flex-shrink:0;font-family:'Nunito',sans-serif;
}
.back-btn:hover{background:rgba(255,255,255,.13);transform:translateX(-3px)}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.5rem 1rem;border:none;border-radius:var(--r-md);
  cursor:pointer;font-size:.82rem;font-weight:800;
  transition:all var(--t);white-space:nowrap;font-family:'Nunito',sans-serif;
  letter-spacing:.2px;
}
.btn:hover{transform:translateY(-2px) scale(1.03)}
.btn:active{transform:scale(.97) !important;box-shadow:none !important}

.btn-primary{background:linear-gradient(135deg,#2285D8 0%,var(--blue) 100%);color:#fff;box-shadow:0 4px 18px rgba(26,111,181,.38)}
.btn-primary:hover{box-shadow:0 8px 30px rgba(26,111,181,.58)}
.btn-success{background:linear-gradient(135deg,#50D055 0%,var(--green) 100%);color:#fff;box-shadow:0 4px 18px rgba(67,176,71,.38)}
.btn-success:hover{box-shadow:0 8px 30px rgba(67,176,71,.58)}
.btn-danger{background:linear-gradient(135deg,#F03030 0%,var(--red) 100%);color:#fff;box-shadow:0 4px 18px rgba(229,37,33,.38)}
.btn-danger:hover{box-shadow:0 8px 30px rgba(229,37,33,.58)}
.btn-yellow{background:linear-gradient(135deg,#FFE040 0%,var(--yellow) 100%);color:#000;box-shadow:0 4px 18px rgba(251,208,0,.38)}
.btn-yellow:hover{box-shadow:0 8px 30px rgba(251,208,0,.58)}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,.13);border-color:var(--border-h);box-shadow:0 4px 18px rgba(255,255,255,.06)}
.btn-sm  {padding:.34rem .7rem;font-size:.76rem}
.btn-xs  {padding:.22rem .48rem;font-size:.7rem}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:var(--r-sm)}

/* ── STATS BAR ── */
.stats-bar{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.1rem}
.stat-card{
  flex:1;min-width:100px;
  background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,rgba(255,255,255,.03) 100%);
  border:1px solid var(--border);border-radius:var(--r-lg);
  padding:.8rem 1rem;display:flex;align-items:center;gap:.65rem;
  box-shadow:var(--sh-sm);transition:all var(--t);animation:fadeInUp .3s ease both;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--border-h)}
.stat-icon{font-size:1.45rem;flex-shrink:0}
.stat-val {font-size:1.35rem;font-weight:900;color:var(--text);line-height:1}
.stat-lbl {font-size:.6rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:.12rem}

/* ── CHAMPION BANNER ── */
.champion-banner{
  background:linear-gradient(135deg,rgba(255,215,0,.15) 0%,rgba(255,215,0,.04) 100%);
  border:2px solid rgba(255,215,0,.34);border-radius:var(--r-xl);
  padding:1.1rem 1.3rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:1rem;
  box-shadow:0 4px 36px rgba(255,215,0,.13),var(--sh-sm);
  animation:fadeInUp .35s ease both;
}
.champion-trophy{font-size:2.6rem;flex-shrink:0;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 14px rgba(255,215,0,.55))}
.champion-info h2{font-size:.68rem;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px}
.champion-info p{font-size:.88rem;color:rgba(255,255,255,.72);margin-top:.22rem;font-weight:700}
.champion-pts{margin-left:auto;text-align:right;flex-shrink:0}
.champion-pts span{display:block;font-size:2rem;font-weight:900;color:var(--gold);line-height:1;text-shadow:0 0 26px rgba(255,215,0,.48)}
.champion-pts small{font-size:.6rem;color:rgba(255,255,255,.4);text-transform:uppercase}

/* ── RECORD BANNER ── */
.record-banner{
  background:linear-gradient(135deg,rgba(255,215,0,.1) 0%,rgba(232,119,34,.06) 100%);
  border:1px solid rgba(255,215,0,.22);border-radius:var(--r-md);
  padding:.8rem 1.1rem;margin-bottom:1rem;
  display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
  animation:fadeInUp .4s ease both;
}
.record-icon{font-size:1.5rem;flex-shrink:0}
.record-body strong{color:var(--gold);font-size:.85rem;display:block}
.record-body span{color:var(--text2);font-size:.74rem}
.record-pts{margin-left:auto;font-size:1.6rem;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.5);flex-shrink:0}
.record-pts small{font-size:.45em;display:block;color:rgba(255,215,0,.5);text-align:right}

/* ── PODIUM ── */
.podium-section{
  background:linear-gradient(160deg,rgba(22,22,22,.98) 0%,rgba(13,13,13,.99) 100%);
  border:1px solid var(--border);border-radius:var(--r-xl);
  overflow:hidden;margin-bottom:1rem;box-shadow:var(--sh-md);
  animation:fadeInUp .3s ease both;
}
.podium-header{
  padding:1rem 1.2rem .5rem;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);margin-bottom:.5rem;
}
.podium-section-title{
  font-family:'Press Start 2P',monospace;
  font-size:.6rem;font-weight:normal;color:var(--yellow);
  letter-spacing:1px;text-shadow:0 0 14px rgba(251,208,0,.32);
}
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:.5rem;padding:.5rem .8rem 0}
.podium-slot{flex:1;display:flex;flex-direction:column;align-items:center;max-width:160px}
.podium-slot.pos2{order:1;animation:fadeInUp .4s .15s ease both}
.podium-slot.pos1{order:2;animation:fadeInUp .4s .0s ease both}
.podium-slot.pos3{order:3;animation:fadeInUp .4s .25s ease both}
.podium-crown{font-size:1.1rem;margin-bottom:.1rem;animation:crownFloat 3s ease-in-out infinite;display:block;text-align:center;filter:drop-shadow(0 0 10px rgba(255,215,0,.65))}
@keyframes pixelBounce{0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}}
.podium-char{display:flex;justify-content:center;margin-bottom:.15rem;animation:pixelBounce 1.8s ease-in-out infinite}
.podium-slot.pos2 .podium-char{animation-delay:.3s}
.podium-slot.pos3 .podium-char{animation-delay:.6s}
.podium-name{font-size:.8rem;font-weight:900;text-align:center;margin-bottom:.14rem;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 .2rem}
.podium-slot.pos1 .podium-name{font-size:.96rem;color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.32)}
.podium-slot.pos2 .podium-name{color:var(--silver)}
.podium-slot.pos3 .podium-name{color:var(--bronze)}
.podium-pts{font-size:.72rem;font-weight:700;color:var(--text2);margin-bottom:.5rem;text-align:center}
.podium-slot.pos1 .podium-pts{font-size:.85rem;color:var(--gold);font-weight:900}
.podium-bar{width:100%;border-radius:8px 8px 0 0;position:relative;overflow:hidden;animation:podiumRise .55s ease both}
.podium-slot.pos1 .podium-bar{height:84px;background:linear-gradient(180deg,#FFD700 0%,#A08000 100%);box-shadow:0 -8px 28px rgba(255,215,0,.32);animation-delay:.1s}
.podium-slot.pos2 .podium-bar{height:58px;background:linear-gradient(180deg,#D4D4D4 0%,#888 100%);animation-delay:.2s}
.podium-slot.pos3 .podium-bar{height:42px;background:linear-gradient(180deg,#CD7F32 0%,#7B4A1C 100%);animation-delay:.3s}
.podium-bar-num{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;color:rgba(0,0,0,.38)}
.podium-slot.pos1 .podium-bar-num{font-size:.7rem}
.podium-slot.pos2 .podium-bar-num{font-size:.55rem}
.podium-slot.pos3 .podium-bar-num{font-size:.48rem}

/* ── RANK REST LIST ── */
.rank-rest{padding:.5rem .8rem .9rem}
.rank-row{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem .75rem;border-radius:var(--r-md);margin-bottom:.3rem;
  background:rgba(255,255,255,.04);transition:all var(--t);animation:rowIn .3s ease both;
}
.rank-row:hover{background:rgba(255,255,255,.08);transform:translateX(4px)}
.rank-pos{width:24px;text-align:center;font-size:.8rem;font-weight:900;flex-shrink:0;color:var(--text3)}
.rank-name{flex:1;font-size:.9rem;font-weight:800}
.rank-pts{font-size:.95rem;font-weight:900;color:var(--yellow)}
.rank-sub{font-size:.7rem;color:var(--text3);min-width:55px;text-align:right}

/* ── RANKING TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r-md);overflow:hidden}
.ranking-tbl{width:100%;border-collapse:collapse;font-size:.87rem}
.ranking-tbl th{
  background:rgba(255,255,255,.04);padding:.5rem .65rem;
  text-align:left;font-size:.65rem;color:var(--text3);
  border-bottom:1px solid var(--border);white-space:nowrap;
  text-transform:uppercase;letter-spacing:.5px;font-weight:800;
}
.ranking-tbl td{padding:.6rem .65rem;border-bottom:1px solid rgba(255,255,255,.04)}
.ranking-tbl tr:last-child td{border-bottom:none}
.ranking-tbl tbody tr{transition:background var(--t)}
.ranking-tbl tbody tr:hover td{background:rgba(255,255,255,.045)}
.pos-1{color:var(--gold);font-weight:800}
.pos-2{color:var(--silver);font-weight:800}
.pos-3{color:var(--bronze);font-weight:800}
.pts-cell{font-weight:900;color:var(--yellow)}

/* ── WIN BAR ── */
.win-bar{height:6px;background:rgba(255,255,255,.07);border-radius:var(--r-full);min-width:60px;max-width:100px;overflow:hidden}
.win-bar-fill{height:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--yellow),var(--red));transition:width .7s ease}

/* ── SESSION ITEMS ── */
.session-item{
  background:linear-gradient(135deg,rgba(255,255,255,.058) 0%,rgba(255,255,255,.024) 100%);
  border:1px solid var(--border);
  border-left:4px solid var(--yellow); /* complete = gold */
  border-radius:var(--r-lg);padding:1rem 1.2rem;margin-bottom:.65rem;
  cursor:pointer;transition:all var(--t);
  display:flex;justify-content:space-between;align-items:center;gap:.6rem;
  box-shadow:var(--sh-sm);animation:fadeInUp .3s ease both;
}
.session-item:hover{
  border-color:rgba(251,208,0,.45);border-left-color:var(--yellow);
  background:linear-gradient(135deg,rgba(255,255,255,.088) 0%,rgba(255,255,255,.04) 100%);
  transform:translateY(-2px);
  box-shadow:var(--sh-md),0 0 0 1px rgba(251,208,0,.14);
}
/* historical = grey border */
.session-item.is-historical{
  border-left-color:var(--text3);
  border-color:rgba(255,255,255,.07);
}
.session-item.is-historical:hover{
  border-left-color:var(--text2);
  border-color:rgba(255,255,255,.14);
  box-shadow:var(--sh-md);
}
.si-info h3{font-size:.92rem;font-weight:800;margin-bottom:.18rem;display:flex;align-items:center;gap:.38rem;flex-wrap:wrap}
.si-date{font-size:.7rem;color:var(--text3);font-weight:700}
.si-winner{text-align:right;flex-shrink:0}
.si-winner-name{font-size:.86rem;font-weight:900;color:var(--yellow)}
.si-winner-pts{font-size:.68rem;color:var(--text3);font-weight:700}
.si-actions{display:flex;gap:.38rem;flex-shrink:0}

/* ── BADGES ── */
.hist-badge{
  display:inline-flex;align-items:center;gap:.2rem;
  background:rgba(90,90,120,.2);border:1px solid rgba(100,100,140,.28);
  color:#8888AA;font-size:.57rem;font-weight:800;
  padding:2px 7px;border-radius:var(--r-sm);white-space:nowrap;flex-shrink:0;
}

/* ── HISTORICAL DETAIL ── */
.hist-winner-card{

const MK_POINTS     = [15,12,10,8,7,6,5,4,3,2,1,0];
const RAINBOW_POINTS= [30,24,20,16,14,12,10,8,6,4,2,0];

const NUM_RACES     = 9;

function racePts(pos, isRainbow){
  if(pos<1||pos>12) return 0;
  return isRainbow ? RAINBOW_POINTS[pos-1] : MK_POINTS[pos-1];
}

// Sesión "histórica" = flag historical:true O tiene historicalWinner definido
function isHistoricalLike(s){
  return !!s.historical || !!(s.historicalWinner && typeof s.historicalWinner==='object' && s.historicalWinner.pid);
}

// Extrae el número de "Jornada N" para ordenar correctamente
function sessionSortNum(s){
  const m = s.name.match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

// ════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let isAdmin = false;
let currentView = 'home';
let currentSessionId = null;
let db = null;
let isLoading = true;
let _suppressNextSnapshot = false;
let fsDocRef = null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function createDefaultRaces(){
  return Array.from({length:NUM_RACES}, (_,i)=>({
    id: uid(),
    name: i===8 ? 'Senda Arcoíris' : '',
    rainbow: i===8,
    results: []
  }));
}

// ════════════════════════════════════════════════════════════════
//  FIREBASE / FIRESTORE
// ════════════════════════════════════════════════════════════════
function saveDB(){
  if(!fsDocRef) return;
  _suppressNextSnapshot = true;
  fsDocRef.set(db).catch(err => {
    _suppressNextSnapshot = false;
    console.error('Firestore save error:', err);
    toast('Error guardando datos', 'error');
  });
}

function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  const firestore = firebase.firestore();
  fsDocRef = firestore.collection('app').doc('state');

  renderAll();

  fsDocRef.onSnapshot(snapshot => {
    if(!snapshot.exists){
      const seeded = {
        players: [...SEED_PLAYERS],
        sessions: SEED_SESSIONS.map(s => ({...s, races:[...s.races]}))
      };
      fsDocRef.set(seeded).catch(err => {
        console.error('Seed error:', err);
        toast('Error inicializando la base de datos', 'error');
      });
      return;
    }
    db = snapshot.data();
    isLoading = false;
    if(_suppressNextSnapshot){ _suppressNextSnapshot = false; return; }
    renderAll();
  }, err => {
    console.error('Firestore listener error:', err);
    isLoading = false;
    toast('Error de conexión con Firebase', 'error');
    renderAll();
  });
}

// ════════════════════════════════════════════════════════════════
//  COMPUTATIONS
// ════════════════════════════════════════════════════════════════
function sessionRanking(sid){
  const sess = db.sessions.find(s=>s.id===sid);
  if(!sess) return [];
  if(isHistoricalLike(sess)){
    if(!sess.historicalWinner) return [];
    return [{pid:sess.historicalWinner.pid, name:playerName(sess.historicalWinner.pid), p:sess.historicalWinner.pts}];
  }
  const acc = {};
  sess.races.forEach(r=>{
    r.results.forEach(res=>{
      if(!acc[res.pid]) acc[res.pid]=0;
      acc[res.pid] += racePts(res.pos, r.rainbow);
    });
  });
  return toRankList(acc);
}

function seasonRanking(){
  const acc = {};
  db.sessions.filter(s=>!isHistoricalLike(s)).forEach(sess=>{
    sess.races.forEach(r=>{
      r.results.forEach(res=>{
        if(!acc[res.pid]) acc[res.pid]=0;
        acc[res.pid] += racePts(res.pos, r.rainbow);
      });
    });
  });
  return toRankList(acc);
}

function historicalWins(){
  const wins = {};
  db.sessions.filter(s=>isHistoricalLike(s)).forEach(s=>{
    if(s.historicalWinner){
      const pid = s.historicalWinner.pid;
      wins[pid] = (wins[pid]||0)+1;
    }
  });
  return Object.entries(wins)
    .map(([pid,w])=>({pid,name:playerName(pid),w}))
    .sort((a,b)=>b.w-a.w);
}

function getRecord(){
  let rec = null;
  db.sessions.forEach(s=>{
    if(isHistoricalLike(s) && s.historicalWinner){
      if(!rec || s.historicalWinner.pts>rec.pts)
        rec={pid:s.historicalWinner.pid,pts:s.historicalWinner.pts,sessionName:s.name,date:s.date,sid:s.id};
    } else if(!isHistoricalLike(s)){
      const rank=sessionRanking(s.id);
      if(rank.length && (!rec||rank[0].p>rec.pts))
        rec={pid:rank[0].pid,pts:rank[0].p,sessionName:s.name,date:s.date,sid:s.id};
    }
  });
  return rec;
}

function toRankList(acc){
  return Object.entries(acc)
    .map(([pid,p])=>({pid,name:playerName(pid),p}))
    .sort((a,b)=>b.p-a.p);
}

function playerName(pid){
  const pl=db.players.find(p=>p.id===pid);
  return pl?pl.name:'?';
}

function sessionWinner(sid){
  const sess=db.sessions.find(s=>s.id===sid);
  if(sess && isHistoricalLike(sess) && sess.historicalWinner)
    return {pid:sess.historicalWinner.pid,name:playerName(sess.historicalWinner.pid),p:sess.historicalWinner.pts};
  const r=sessionRanking(sid);
  return r.length?r[0]:null;
}

function playerSessionCount(pid){
  return db.sessions.filter(s=>{
    if(isHistoricalLike(s)) return s.historicalWinner?.pid===pid;
    return s.races.some(r=>r.results.some(res=>res.pid===pid));
  }).length;
}

function playerRaceWins(pid){
  let w=0;
  db.sessions.filter(s=>!isHistoricalLike(s)).forEach(s=>{
    s.races.forEach(r=>{
      const first=r.results.find(res=>res.pos===1);
      if(first?.pid===pid) w++;
    });
  });
  return w;
}

function sessionProgress(sess){
  if(isHistoricalLike(sess)) return null;
  const done = sess.races.filter(r=>r.results.length>0).length;
  return {done, total:sess.races.length};
}

}

function renderAll(){
  document.getElementById('header').innerHTML = renderHeader();
  document.getElementById('nav').innerHTML = renderNav();
  document.getElementById('btm-nav').innerHTML = renderBtmNav();
  const content = document.getElementById('content');

  if(isLoading || !db){
    content.innerHTML = `<div class="empty" style="padding:4rem 1rem">
      <div class="spinner"></div>
      <p>Conectando con Firebase…</p>
      <p class="text-xs text-gray mt-xs">Sincronizando datos en tiempo real</p>
    </div>`;
    return;
  }

  switch(currentView){
    case 'home':    content.innerHTML=renderHome();    break;
    case 'sessions':content.innerHTML=renderSessions();break;
    case 'detail':  content.innerHTML=renderDetail();  break;
    case 'admin':   content.innerHTML=renderAdmin();   break;
    default:        content.innerHTML=renderHome();
  }
}

function renderHeader(){
  return `<div class="header-title">🏆 MARIO KART CHAMPIONSHIP 🏆</div>
    <div class="header-sub">⚡ Gran Premio · Temporada ${new Date().getFullYear()} ⚡</div>`;
}

function renderNav(){
  return `

    <button class="nav-pill ${currentView==='sessions'?'active':''}" onclick="navigate('sessions')">📅 Jornadas</button>

function renderBtmNav(){
  const items = [
    {view:'home',    icon:'🏠', label:'Inicio'},
    {view:'sessions',icon:'📅', label:'Jornadas'},
    {view:'admin',   icon: isAdmin?'⚙️':'🔑', label:'Admin'},
  ];
  return items.map(it=>`
    <button class="btm-btn ${currentView===it.view?'active':''}" onclick="navigate('${it.view}')">
      <div class="btm-icon-wrap">${it.icon}</div>
      <span class="btm-label">${it.label}</span>
    </button>`).join('');
}

function renderHome(){
  const histWins  = historicalWins();

  const histCount = db.sessions.filter(s=>isHistoricalLike(s)).length;
  const newSess   = db.sessions.filter(s=>!isHistoricalLike(s));
  const totalRaces= histCount * NUM_RACES
    + newSess.reduce((a,s)=>a+s.races.filter(r=>r.results.length>0).length,0);

  let html = '';

  // ── Stats bar ──
  html += `<div class="stats-bar">
    <div class="stat-card"><span class="stat-icon">📅</span><div class="stat-info"><div class="stat-val">${db.sessions.length}</div><div class="stat-lbl">Jornadas</div></div></div>
    <div class="stat-card"><span class="stat-icon">🏁</span><div class="stat-info"><div class="stat-val">${totalRaces}</div><div class="stat-lbl">Carreras</div></div></div>
    <div class="stat-card"><span class="stat-icon">📚</span><div class="stat-info"><div class="stat-val">${histCount}</div><div class="stat-lbl">Históricas</div></div></div>
    <div class="stat-card"><span class="stat-icon">👥</span><div class="stat-info"><div class="stat-val">${db.players.length}</div><div class="stat-lbl">Jugadores</div></div></div>
  </div>`;

  // ── Champion banner ──
  const leader = histWins[0];
  if(leader){
    html += `<div class="champion-banner">
      <div class="champion-trophy">🏆</div>
      <div class="champion-info">
        <h2>Líder Histórico</h2>
        <p>${esc(leader.name)} · ${leader.w} victoria${leader.w!==1?'s':''} en ${histCount} jornadas</p>
      </div>
      <div class="champion-pts"><span>${leader.w}</span><small>victorias</small></div>
    </div>`;
  }

  // ── Record banner ──
  if(rec){
    html += `<div class="record-banner">
      <div class="record-icon">⭐</div>
      <div class="record-body">
        <strong>Récord de temporada</strong>
        <span>${esc(playerName(rec.pid))} · ${esc(rec.sessionName)} · ${fmtDate(rec.date)}</span>
      </div>
      <div class="record-pts">${rec.pts}<small>pts</small></div>
    </div>`;
  }

  // ── 2-column grid on desktop ──
  html += `<div class="home-2col">`;

  // ── Palmares ──
  html += `<div class="palmares-card full">
    <div class="card-hdr"><div class="card-title">📚 Palmarés Histórico · ${histCount} Jornadas</div></div>`;
  if(histWins.length===0){
    html += `<div class="text-gray text-sm">Sin datos históricos.</div>`;
  } else {
    const maxW = histWins[0].w;
    html += `<div class="tbl-wrap"><table class="ranking-tbl">
      <thead><tr><th>#</th><th>Jugador</th><th>Victorias</th><th></th></tr></thead>
      <tbody>
      ${histWins.map((r,i)=>{
        const cls=i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
        return `<tr style="animation:rowIn .3s ${i*0.05}s ease both">
          <td class="${cls}">${medal}</td>
          <td class="${cls}">${esc(r.name)}</td>
          <td class="pts-cell">${r.w}</td>
          <td><div class="win-bar"><div class="win-bar-fill" style="width:${Math.round((r.w/maxW)*100)}%"></div></div></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  }
  html += `</div>`;

  // ── Season ranking (podium + rest) ──
  if(seasonRnk.length > 0){
    html += `<div class="podium-section full">
      <div class="podium-header">
        <div class="podium-section-title">🏆 Ranking Temporada Actual</div>
      </div>`;

    const p1 = seasonRnk[0]||null;
    const p2 = seasonRnk[1]||null;

    html += `<div class="podium-wrap">`;
    [[p2,'pos2','🥈',2],[p1,'pos1','🥇',1],[p3,'pos3','🥉',3]].forEach(([r,cls,medal,num])=>{

        <div class="podium-char">${svgForRank(num)}</div>
        <div class="podium-name">${esc(r.name)}</div>

    if(seasonRnk.length > 3){

      seasonRnk.slice(3).forEach((r,i)=>{
        html += `<div class="rank-row" style="animation-delay:${i*0.05}s">

          <div class="rank-sub">${playerRaceWins(r.pid)} vic.</div>

      });
      html += `</div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="card full">
      <div class="card-hdr"><div class="card-title">🏆 Ranking Temporada Actual</div></div>
      <div class="empty" style="padding:1.5rem">
        <span class="empty-icon" style="font-size:2.2rem">🏎️</span>

  html += `<div class="text-center mt-md">

  // ── Score system ──
  html += `<div class="divider"></div>
  <div class="card">

      <div class="score-col">

            <strong>${p}</strong>

        </div>
      </div>
      <div class="score-col">
        <div class="score-col-title rainbow-title">🌈 Senda Arcoíris (×2 pts)</div>
        <div class="score-pills">
          ${RAINBOW_POINTS.map((p,i)=>`<div class="score-pill rainbow-pill">

            <strong>${p}</strong>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  return html;
}

// ════════════════════════════════════════════════════════════════
//  VIEW: SESSIONS
// ════════════════════════════════════════════════════════════════
function renderSessions(){
  const sorted = [...db.sessions].sort((a,b)=>sessionSortNum(b)-sessionSortNum(a));

  let html = `<div class="view-hdr">
    <div class="view-title">📅 Jornadas (${db.sessions.length})</div>
    ${isAdmin?`<button class="btn btn-success btn-sm" onclick="modalAddSession()">+ Nueva jornada</button>`:''}
  </div>`;

  if(sorted.length===0){
    html += `<div class="empty"><span class="empty-icon">📅</span><p>No hay jornadas todavía.</p>
    ${isAdmin?`<button class="btn btn-success mt-sm" onclick="modalAddSession()">+ Crear primera jornada</button>`:''}
    </div>`;
  } else {
    html += sorted.map((s,idx)=>{
      const w = sessionWinner(s.id);
      const isHist = isHistoricalLike(s);
      const prog = sessionProgress(s);
      let sub = '';
      if(isHist) sub = 'Datos históricos';
      else if(prog) sub = `${prog.done}/${prog.total} carreras · 🌈 Senda Arcoíris incluida`;
      return `
      <div class="session-item ${isHist?'is-historical':''}" onclick="navigate('detail','${s.id}')"
           style="animation:fadeInUp .3s ${Math.min(idx*0.03,0.4)}s ease both">
        <div class="si-info">
          <h3>${esc(s.name)}${isHist?` <span class="hist-badge">📚 Histórico</span>`:''}</h3>
          <div class="si-date">${fmtDate(s.date)}${sub?' · '+sub:''}</div>
        </div>
        <div class="si-winner">
          ${w
            ?`<div class="si-winner-name">🏆 ${esc(w.name)}</div><div class="si-winner-pts">${w.p} pts</div>`
            :`<div class="text-gray text-xs">Sin resultados</div>`
          }
        </div>
        ${isAdmin?`<div class="si-actions" onclick="event.stopPropagation()">
          <button class="btn btn-primary btn-icon" onclick="modalEditSession('${s.id}')">✏️</button>
          <button class="btn btn-danger btn-icon" onclick="confirmDeleteSession('${s.id}')">🗑️</button>
        </div>`:''}
      </div>`;
    }).join('');
  }
  return html;
}

// ════════════════════════════════════════════════════════════════
function renderDetail(){
  const sess = db.sessions.find(s=>s.id===currentSessionId);
  if(!sess) return `<div class="empty"><span class="empty-icon">❌</span><p>Jornada no encontrada.</p></div>`;
  if(isHistoricalLike(sess)) return renderHistoricalDetail(sess);

  const rank = sessionRanking(sess.id);
  const prog = sessionProgress(sess);

  let html = `
  <div class="view-hdr">
    <button class="back-btn" onclick="navigate('sessions')">← Volver</button>
    <div class="view-title">${esc(sess.name)}</div>
  </div>
  <div class="text-xs text-gray mb-sm">📅 ${fmtDate(sess.date)} · ${prog.done}/${prog.total} carreras completadas</div>`;

  html += `<div class="card">
    <div class="card-hdr"><div class="card-title">🏆 Ranking de Jornada</div></div>`;
  if(rank.length===0){
    html += `<div class="text-gray text-sm">Sin resultados aún — introduce los resultados de las carreras.</div>`;
  } else {
    html += `<div class="tbl-wrap"><table class="ranking-tbl">
      <thead><tr><th>#</th><th>Jugador</th><th>Puntos</th></tr></thead>
      <tbody>
      ${rank.map((r,i)=>{
        const cls=i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
        return `<tr><td class="${cls}">${medal}</td><td class="${cls}">${esc(r.name)}</td><td class="pts-cell">${r.p}</td></tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  }
  html += `</div>`;

  html += `<div class="section-title">🏁 Carreras de la jornada</div>`;

  sess.races.forEach((race,idx)=>{
    const sortedRes = [...race.results].sort((a,b)=>a.pos-b.pos);
    const hasResults = race.results.length > 0;
    const isRainbow = !!race.rainbow;
    const raceName = race.name || `Carrera ${idx+1}`;

    html += `<div class="race-card ${isRainbow?'rainbow':''}">
      <div class="race-card-hdr">
        <div class="race-card-left">
          <span class="race-num ${isRainbow?'rainbow-num':''}">${isRainbow?'🌈 Carrera 9 · Puntuación doble':`Carrera ${idx+1}`}</span>
          <div class="race-name-txt ${isRainbow?'rainbow-name':''}">${isRainbow?'🌈 '+esc(raceName):esc(raceName)||`Carrera ${idx+1}`}</div>
        </div>
        <div class="flex gap-xs" style="align-items:center">
          ${isRainbow?`<span class="rainbow-x2-badge">×2 pts</span>`:''}
          ${isAdmin?`<button class="btn btn-primary btn-icon btn-sm" onclick="modalEditRace('${sess.id}','${race.id}')" title="Introducir resultados">✏️</button>`:''}
          ${isAdmin&&!isRainbow?`<button class="btn btn-danger btn-icon btn-sm" onclick="confirmDeleteRace('${sess.id}','${race.id}')" title="Eliminar">🗑️</button>`:''}
        </div>
      </div>
      ${hasResults
        ?`<div class="race-chip-wrap">
            ${sortedRes.map(r=>`<div class="chip ${isRainbow?'rainbow-chip':''}">
              <span class="pos-badge ${r.pos===1?'p1':r.pos===2?'p2':r.pos===3?'p3':''}">${r.pos}º</span>
              <span>${esc(playerName(r.pid))}</span>
              <span class="text-gray text-xs">(${racePts(r.pos,isRainbow)})</span>
            </div>`).join('')}
          </div>`
        :`<div class="no-results-txt">${isAdmin?'Sin resultados · pulsa ✏️ para introducirlos':'Sin resultados'}</div>`
      }
    </div>`;
  });

  if(isAdmin){
    html += `<div class="divider"></div>
    <div class="flex gap-sm">
      <button class="btn btn-ghost btn-sm" onclick="modalEditSession('${sess.id}')">✏️ Editar jornada</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteSession('${sess.id}')">🗑️ Eliminar jornada</button>
    </div>`;
  }
  return html;
}

function renderHistoricalDetail(sess){
  const hw = sess.historicalWinner;
  const rec = getRecord();
  const isRecordSession = rec && rec.sid===sess.id;

  let html = `
  <div class="view-hdr">
    <button class="back-btn" onclick="navigate('sessions')">← Volver</button>
    <div class="view-title">${esc(sess.name)} <span class="hist-badge">📚 Histórico</span></div>
  </div>
  <div class="text-xs text-gray mb-sm">📅 ${fmtDate(sess.date)}</div>
  <div class="hist-note">
    <span class="hist-note-icon">📚</span>
    <span>Datos históricos — sin detalle de carreras individuales. Se registra únicamente el ganador de la jornada.</span>
  </div>`;

  if(hw){
    html += `<div class="hist-winner-card">
      <span class="trophy-big">🏆</span>
      <div class="winner-label">Ganador de la jornada</div>
      <div class="winner-name">${esc(playerName(hw.pid))}</div>
      <div class="winner-pts"><strong>${hw.pts}</strong> puntos</div>
      ${isRecordSession?`<div class="record-crown">⭐ Récord histórico de temporada</div>`:''}
    </div>`;
  }

  if(isAdmin){
    html += `<div class="divider"></div>
    <div class="flex gap-sm">
      <button class="btn btn-ghost btn-sm" onclick="modalEditSession('${sess.id}')">✏️ Editar jornada</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteSession('${sess.id}')">🗑️ Eliminar jornada</button>
    </div>`;
  }
  return html;
}

// ════════════════════════════════════════════════════════════════
//  VIEW: ADMIN
// ════════════════════════════════════════════════════════════════
function renderAdmin(){
  if(!isAdmin) return renderAdminLogin();

  const pls = db.players;
  const sess = [...db.sessions].sort((a,b)=>sessionSortNum(b)-sessionSortNum(a));
  const histCount = sess.filter(s=>isHistoricalLike(s)).length;

  return `
  <div class="view-hdr">
    <div class="view-title">⚙️ Panel Admin</div>
    <button class="btn btn-ghost btn-sm" onclick="logoutAdmin()">🔓 Cerrar sesión</button>
  </div>

  <div class="card">
    <div class="section-title">
      👥 Jugadores (${pls.length})
      <button class="btn btn-success btn-sm" onclick="modalAddPlayer()">+ Añadir jugador</button>
    </div>
    ${pls.length===0
      ?`<div class="text-gray text-sm">No hay jugadores.</div>`
      :`<div class="players-wrap">
          ${pls.map(p=>`<div class="player-chip">
            <span>${esc(p.name)}</span>
            <span class="type-pill ${p.type}">${p.type==='guest'?'Invitado':'Fijo'}</span>
            <button class="del-btn" onclick="confirmDeletePlayer('${p.id}')">×</button>
          </div>`).join('')}
        </div>`
    }
  </div>

  <div class="card">
    <div class="section-title">
      📅 Jornadas (${db.sessions.length} · ${histCount} históricas)
      <button class="btn btn-success btn-sm" onclick="modalAddSession()">+ Nueva jornada</button>
    </div>
    <div class="text-xs text-gray mb-sm">Las nuevas jornadas se crean con 9 carreras predefinidas (8 estándar + 🌈 Senda Arcoíris).</div>
    ${sess.length===0
      ?`<div class="text-gray text-sm">No hay jornadas.</div>`
      :sess.map(s=>{
        const prog = sessionProgress(s);
        return `<div class="session-item ${isHistoricalLike(s)?'is-historical':''}" onclick="navigate('detail','${s.id}')">
          <div class="si-info">
            <h3>${esc(s.name)}${isHistoricalLike(s)?` <span class="hist-badge">📚</span>`:''}</h3>
            <div class="si-date">${fmtDate(s.date)} · ${isHistoricalLike(s)?'Datos históricos':prog.done+'/'+prog.total+' carreras'}</div>
          </div>
          <div class="si-actions" onclick="event.stopPropagation()">
            <button class="btn btn-primary btn-icon" onclick="modalEditSession('${s.id}')">✏️</button>
            <button class="btn btn-danger btn-icon" onclick="confirmDeleteSession('${s.id}')">🗑️</button>
          </div>
        </div>`;
      }).join('')
    }
  </div>

  <div class="text-xs text-gray text-center" style="margin-top:.5rem">
    ☁️ Datos sincronizados en tiempo real con Firebase Firestore.
  </div>`;
}

function renderAdminLogin(){
  return `<div class="admin-login-wrap">
    <span class="icon">🔑</span>
    <h2>Acceso Administrador</h2>
    <div class="form-group">
      <input type="password" class="form-control" id="adm-pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doAdminLogin()">
    </div>
    <button class="btn btn-primary w100" onclick="doAdminLogin()">Entrar →</button>
  </div>`;
}

// ════════════════════════════════════════════════════════════════
//  MODAL ENGINE
// ════════════════════════════════════════════════════════════════
function openModal(title, bodyHTML, onOk, okLabel='Guardar', extraClass=''){
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'mk-modal';
  overlay.innerHTML = `
    <div class="modal ${extraClass}" id="mk-modal-box">
      <div class="modal-title ${extraClass?'rainbow-title-txt':''}">${title}</div>
      <div id="mk-modal-body">${bodyHTML}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-success" id="mk-modal-ok">${okLabel}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('mk-modal-ok').onclick = onOk;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  setTimeout(()=>{ const el=overlay.querySelector('input,select'); if(el) el.focus(); }, 60);
}

function closeModal(){
  const m = document.getElementById('mk-modal');
  if(m) m.remove();
}

// ════════════════════════════════════════════════════════════════
//  MODAL: ADD PLAYER
// ════════════════════════════════════════════════════════════════
function modalAddPlayer(){
  openModal('👥 Añadir Jugador',`
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" class="form-control" id="m-pname" placeholder="Nombre del jugador" maxlength="30">
    </div>
    <div class="form-group">
      <label>Tipo de jugador</label>
      <select class="form-control" id="m-ptype">
        <option value="fixed">Fijo (participa siempre)</option>
        <option value="guest">Invitado (ocasional)</option>
      </select>
    </div>`,()=>{
    const name = document.getElementById('m-pname').value.trim();
    const type = document.getElementById('m-ptype').value;
    if(!name){ toast('El nombre es obligatorio','error'); return; }
    if(db.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){ toast('Ya existe ese jugador','error'); return; }
    db.players.push({id:uid(),name,type});
    saveDB(); closeModal(); renderAll();
    toast(`✅ Jugador "${name}" añadido`);
  });
}

// ════════════════════════════════════════════════════════════════
//  MODAL: ADD / EDIT SESSION
// ════════════════════════════════════════════════════════════════
function modalAddSession(){
  const today = new Date().toISOString().split('T')[0];
  const nextNum = db.sessions.length + 1;
  openModal('📅 Nueva Jornada',`
    <div class="form-group">
      <label>Nombre de la jornada</label>
      <input type="text" class="form-control" id="m-sname" value="Jornada ${nextNum}" maxlength="50">
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" class="form-control" id="m-sdate" value="${today}">
    </div>
    <div class="text-xs text-gray mt-xs">Se crearán automáticamente 9 carreras: Carreras 1–8 (estándar) + 🌈 Senda Arcoíris (puntos dobles).</div>`,()=>{
    const name = document.getElementById('m-sname').value.trim();
    const date = document.getElementById('m-sdate').value;
    if(!name){ toast('El nombre es obligatorio','error'); return; }
    if(!date){ toast('La fecha es obligatoria','error'); return; }
    db.sessions.push({id:uid(), name, date, races:createDefaultRaces()});
    saveDB(); closeModal(); renderAll();
    toast(`✅ Jornada "${name}" creada con 9 carreras`);
  });
}

function modalEditSession(sid){
  const s = db.sessions.find(x=>x.id===sid);
  if(!s) return;
  const hwPid = s.historicalWinner?.pid || '';
  const hwPts = s.historicalWinner?.pts ?? '';
  const playerOpts = `<option value="">— Sin ganador histórico —</option>`
    + db.players.map(p=>`<option value="${p.id}" ${hwPid===p.id?'selected':''}>${esc(p.name)}</option>`).join('');

  openModal('✏️ Editar Jornada',`
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" class="form-control" id="m-sname" value="${esc(s.name)}" maxlength="50">
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" class="form-control" id="m-sdate" value="${s.date}">
    </div>
    <div style="height:1px;background:rgba(255,255,255,.08);margin:.7rem 0"></div>
    <div class="form-group">
      <label>Ganador de la jornada <span style="color:var(--text3);font-weight:600">(para jornadas sin detalle de carreras)</span></label>
      <select class="form-control" id="m-hwinner" onchange="document.getElementById('m-hpts-row').style.display=this.value?'block':'none'">
        ${playerOpts}
      </select>
    </div>
    <div class="form-group" id="m-hpts-row" style="display:${hwPid?'block':'none'}">
      <label>Puntos del ganador</label>
      <input type="number" class="form-control" id="m-hpts" value="${hwPts}" min="0" max="150" placeholder="0">
    </div>`,()=>{
    const name = document.getElementById('m-sname').value.trim();
    const date = document.getElementById('m-sdate').value;
    if(!name){ toast('El nombre es obligatorio','error'); return; }
    const newHwPid = document.getElementById('m-hwinner').value;
    const newHwPts = parseInt(document.getElementById('m-hpts')?.value)||0;
    s.name=name; s.date=date;
    if(newHwPid){ s.historicalWinner={pid:newHwPid, pts:newHwPts}; }
    else { delete s.historicalWinner; }
    saveDB(); closeModal(); renderAll();
    toast('✅ Jornada actualizada');
  },'Actualizar');
}

// ════════════════════════════════════════════════════════════════
//  MODAL: EDIT RACE RESULTS
// ════════════════════════════════════════════════════════════════
function modalEditRace(sid, rid){
  const sess = db.sessions.find(s=>s.id===sid);
  const race = sess?.races.find(r=>r.id===rid);
  if(!race) return;
  const idx = sess.races.findIndex(r=>r.id===rid);
  const isRainbow = !!race.rainbow;
  const titleTxt = isRainbow
    ? `🌈 Senda Arcoíris — ${esc(sess.name)}`
    : `🏁 Carrera ${idx+1} — ${esc(sess.name)}`;

  openModal(titleTxt, buildRaceForm(idx, race.name||'', race.results, isRainbow), ()=>{
    saveRace(sid, rid);
  }, 'Guardar resultados', isRainbow?'rainbow-modal':'');
}

function buildRaceForm(idx, raceName, existingResults, isRainbow){
  const ptsTbl = isRainbow ? RAINBOW_POINTS : MK_POINTS;
  const rows = db.players.map(p=>{
    const ex = existingResults ? existingResults.find(r=>r.pid===p.id) : null;
    const opts = `<option value="">—</option>`+
      Array.from({length:12},(_,i)=>`<option value="${i+1}" ${ex&&ex.pos===i+1?'selected':''}>${i+1}º · ${ptsTbl[i]} pts</option>`).join('');
    return `<div class="result-row ${isRainbow?'rainbow-row':''}">
      <div class="player-lbl">
        <span>${esc(p.name)}</span>
        <span class="type-pill ${p.type}">${p.type==='guest'?'Inv':'Fijo'}</span>
      </div>
      <select class="pos-select ${isRainbow?'rainbow-select':''}" data-pid="${p.id}">${opts}</select>
    </div>`;
  }).join('');

  return `
    ${isRainbow?`<div style="background:rgba(140,40,200,.12);border:1px solid rgba(160,80,220,.3);border-radius:var(--r-md);padding:.6rem .8rem;margin-bottom:.8rem;font-size:.8rem">
      🌈 <strong>Senda Arcoíris</strong> — los puntos son el doble de las carreras normales (máx. 30 pts para el 1º).
    </div>`:''}
    <div class="form-group">
      <label>Posición de cada jugador (deja en — si no participó)</label>
      <div class="results-grid">${rows}</div>
    </div>
    <div class="text-xs text-gray mt-xs">⚠️ No pueden repetirse posiciones entre jugadores.</div>`;
}

function saveRace(sid, rid){
  const selects = document.querySelectorAll('.pos-select');
  const results = []; const usedPos = {}; let err = null;
  selects.forEach(sel=>{
    if(err) return;
    const pos = parseInt(sel.value);
    if(!isNaN(pos)&&pos>=1&&pos<=12){
      if(usedPos[pos]){ err=`La posición ${pos}º está asignada a dos jugadores`; return; }
      usedPos[pos]=true;
      results.push({pid:sel.dataset.pid, pos});
    }
  });
  if(err){ toast(err,'error'); return; }
  if(results.length===0){ toast('Añade al menos un resultado','error'); return; }
  const sess = db.sessions.find(s=>s.id===sid);
  const race = sess.races.find(r=>r.id===rid);
  race.results = results;
  saveDB(); closeModal(); renderAll();
  toast('✅ Resultados guardados');
}

// ════════════════════════════════════════════════════════════════
//  CONFIRM DELETES
// ════════════════════════════════════════════════════════════════
function confirmDeletePlayer(pid){
  const p = db.players.find(x=>x.id===pid);
  if(!p) return;
  openModal('🗑️ Eliminar jugador',`
    <p>¿Eliminar a <strong>${esc(p.name)}</strong>?</p>
    <p class="text-sm text-gray mt-xs">Sus resultados históricos se mantienen (aparecerán como "?").</p>`,()=>{
    db.players = db.players.filter(x=>x.id!==pid);
    saveDB(); closeModal(); renderAll();
    toast(`Jugador "${p.name}" eliminado`,'warn');
  },'🗑️ Eliminar');
}

function confirmDeleteSession(sid){
  const s = db.sessions.find(x=>x.id===sid);
  if(!s) return;
  openModal('🗑️ Eliminar jornada',`
    <p>¿Eliminar <strong>${esc(s.name)}</strong>?</p>
    <p class="text-sm text-gray mt-xs">${s.historical?'Se eliminará el registro histórico.':'Se borrarán todas sus carreras y resultados.'} Esta acción no se puede deshacer.</p>`,()=>{
    db.sessions = db.sessions.filter(x=>x.id!==sid);
    saveDB(); closeModal();
    if(currentView==='detail') currentView='sessions';
    renderAll();
    toast(`Jornada "${s.name}" eliminada`,'warn');
  },'🗑️ Eliminar');
}

function confirmDeleteRace(sid, rid){
  openModal('🗑️ Eliminar carrera',`
    <p>¿Eliminar esta carrera?</p>
    <p class="text-sm text-gray mt-xs">Esta acción no se puede deshacer.</p>`,()=>{
    const sess = db.sessions.find(s=>s.id===sid);
    sess.races = sess.races.filter(r=>r.id!==rid);
    saveDB(); closeModal(); renderAll();
    toast('Carrera eliminada','warn');
  },'🗑️ Eliminar');
}

// ════════════════════════════════════════════════════════════════
//  ADMIN AUTH
// ════════════════════════════════════════════════════════════════
function doAdminLogin(){
  const pwd = document.getElementById('adm-pwd')?.value||'';
  if(pwd===ADMIN_PASS){ isAdmin=true; renderAll(); toast('✅ Sesión admin iniciada'); }
  else{
    toast('Contraseña incorrecta','error');
    const el = document.getElementById('adm-pwd');
    if(el){ el.value=''; el.focus(); }
  }
}
function logoutAdmin(){ isAdmin=false; navigate('home'); toast('Sesión admin cerrada'); }

// ════════════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════════════
function fmtDate(d){
  if(!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
}
function esc(str){
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let _toastTimer = null;
function toast(msg, type='success'){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  if(_toastTimer) clearTimeout(_toastTimer);
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = msg;
  document.body.appendChild(el);
  _toastTimer = setTimeout(()=>el.remove(), 3200);
}
